name: Daily Prediction Update

on:
  schedule:
    - cron: '0 4 * * *'   # 12:00 CST = 04:00 UTC
    - cron: '0 12 * * *'  # 20:00 CST = 12:00 UTC
  workflow_dispatch:  # manual trigger

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install numpy scipy pandas requests networkx
      
      - name: Run daily predictions
        run: python scripts/daily_predict.py --save
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add predictions/
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily prediction update $(date +'%Y-%m-%d')"
          git push
